<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <!-- Hidden form to let Netlify recognize and register form submissions from the React app -->
    <form name="candidatura-form" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="text" name="notes" />
      <input type="text" name="quizAnswers" />
      <input type="text" name="sourceReelId" />
      <input type="text" name="timestamp" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
