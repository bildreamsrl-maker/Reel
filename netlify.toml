# Netlify configuration for the Reels lead-gen SPA.
# The app is a static Vite build; the four reel videos live in public/uploads
# and are copied into dist/uploads at build time, so they are served as
# ordinary static files at /uploads/<file>.mp4.
[build]
  command = "npm run build"
  publish = "dist"

# Long-lived, hashed JS/CSS bundles can be cached aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The uploaded reel videos use unique, timestamped filenames, so they are safe
# to cache for a long time while still allowing revalidation.
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Single-page-app fallback: any route that is not a real static file
# (e.g. deep links) serves index.html. Existing files such as the reel
# videos under /uploads and the bundles under /assets are served directly
# and are not affected by this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
